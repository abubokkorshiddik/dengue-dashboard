<!DOCTYPE html>
<html>
<head>
    <title>Dengue dashboard Bangladesh</title>

    <!-- Plotly for chart -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }

        h2 {
            color: #333;
        }

        #controls {
            margin-bottom: 20px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }

        select {
            margin-right: 15px;
            padding: 5px;
        }

        #chart {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<h2>Dengue monthly cases and early warning dashboard</h2>

<div id="controls">
    District:
    <select id="districtSelect"></select>

    Year:
    <select id="yearSelect">
        <option value="All">All</option>
    </select>
</div>

<div id="chart"></div>

<script>
let casesData = [];
let ewsData = [];

// Load both JSON files
async function loadData() {
    try {
        const resCases = await fetch("dengue_bd.json");
        const jsonCases = await resCases.json();

        const resEWS = await fetch("dengue_ews.json");
        const jsonEWS = await resEWS.json();

        // Store historical cases
        casesData = jsonCases.map(d => ({
            District: d.District,
            Month: d.Month,
            Month1: Number(d.Month1),
            Year: Number(d.Year),
            Cases: Number(d.Monthly_cases)
        }));

        // Store future EWS
        ewsData = jsonEWS.map(d => ({
            District: d.District,
            Month: Number(d.Month),
            Year: Number(d.Year),
            Prob_High_Dengue: Number(d.Prob_High_Dengue),
            High_Alert: Number(d.High_Alert)
        }));

        initControls();
        plotData();
    } catch (err) {
        console.error(err);
        alert("Error loading JSON files. Make sure both dengue_bd.json and dengue_ews.json exist in the same folder.");
    }
}

// Unique values
function getUnique(data, key) {
    return [...new Set(data.map(d => d[key]))];
}

// Populate dropdown
function populateDropdown(id, values) {
    const select = document.getElementById(id);
    select.innerHTML = "";
    values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.text = v;
        select.appendChild(opt);
    });
}

// Initialize controls
function initControls() {
    const districts = getUnique(casesData, "District").sort();
    const years = getUnique(casesData.concat(ewsData), "Year").sort();

    populateDropdown("districtSelect", districts);
    populateDropdown("yearSelect", ["All", ...years]);

    document.getElementById("districtSelect").value = districts[0];

    document.getElementById("districtSelect").addEventListener("change", plotData);
    document.getElementById("yearSelect").addEventListener("change", plotData);
}

// Plot chart
function plotData() {
    const district = document.getElementById("districtSelect").value;
    const year = document.getElementById("yearSelect").value;

    // Historical cases
    let filteredCases = casesData.filter(d => d.District === district);
    if (year !== "All") filteredCases = filteredCases.filter(d => d.Year == year);
    filteredCases.sort((a,b) => a.Year - b.Year || a.Month1 - b.Month1);

    // Future EWS
    let filteredEWS = ewsData.filter(d => d.District === district);
    if (year !== "All") filteredEWS = filteredEWS.filter(d => d.Year == year);
    filteredEWS.sort((a,b) => a.Year - b.Year || a.Month - b.Month);

    // X axis
    const xCases = filteredCases.map(d => `${d.Month}-${d.Year}`);
    const yCases = filteredCases.map(d => d.Cases);

    const xEWS = filteredEWS.map(d => `${d.Month}-${d.Year}`);
    const yProb = filteredEWS.map(d => d.Prob_High_Dengue);
    const xAlert = xEWS.filter((_, i) => filteredEWS[i].High_Alert === 1);
    const yAlert = yProb.filter((_, i) => filteredEWS[i].High_Alert === 1);

    const traceCases = {
        x: xCases,
        y: yCases,
        mode: "lines+markers",
        type: "scatter",
        name: "Monthly cases",
        line: { color: "#FF4136" },
        marker: { size: 6 }
    };

    const traceProb = {
        x: xEWS,
        y: yProb,
        mode: "lines+markers",
        type: "scatter",
        name: "Predicted probability",
        line: { color: "#0074D9", dash: "dot" },
        marker: { size: 6 }
    };

    const traceAlert = {
        x: xAlert,
        y: yAlert,
        mode: "markers",
        type: "scatter",
        name: "High Alert",
        marker: { color: "orange", size: 10, symbol: "triangle-up" }
    };

    const layout = {
        title: `Dengue cases and future alerts in ${district}`,
        xaxis: { title: "Month-Year", tickangle: -45 },
        yaxis: { title: "Cases / Probability" },
        margin: { t: 50, b: 100 }
    };

    Plotly.newPlot("chart", [traceCases, traceProb, traceAlert], layout, {responsive: true});
}

// Start
loadData();
</script>

</body>
</html>
