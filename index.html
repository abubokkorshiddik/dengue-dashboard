<!DOCTYPE html>
<html>
<head>
    <title>Dengue dashboard Bangladesh</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f5f5f5; }
        h2 { color: #333; }
        #controls { margin-bottom: 20px; padding: 10px; background: white; border-radius: 8px; }
        select { margin-right: 15px; padding: 5px; }
        #chart, #map { background: white; padding: 10px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body>

<h2>Dengue monthly cases and early warning dashboard</h2>

<div id="controls">
    District:
    <select id="districtSelect"></select>
    Year:
    <select id="yearSelect"><option value="All">All</option></select>
</div>

<div id="chart"></div>
<div id="map" style="height:600px;"></div>

<script>
let casesData = [], ewsData = [], mapData = [];

// Load all JSON files
async function loadData() {
    try {
        const resCases = await fetch("dengue_bd.json");
        const resEWS = await fetch("dengue_ews.json");
        const resMap  = await fetch("bangladesh_districts_small.json");

        const jsonCases = await resCases.json();
        const jsonEWS   = await resEWS.json();
        mapData         = await resMap.json();

        // Store historical cases
        casesData = jsonCases.map(d => ({
            District: d.District,
            Month: d.Month,
            Month1: Number(d.Month1),
            Year: Number(d.Year),
            Cases: Number(d.Monthly_cases)
        }));

        // Store future EWS
        ewsData = jsonEWS.map(d => ({
            District: d.District,
            Month: Number(d.Month),
            Year: Number(d.Year),
            Prob_High_Dengue: Number(d.Prob_High_Dengue),
            High_Alert: Number(d.High_Alert)
        }));

        initControls();
        plotTrend();
        plotMap();
    } catch(err) {
        console.error(err);
        alert("Error loading JSON files. Make sure all JSON files exist in the same folder.");
    }
}

// Unique values
function getUnique(data, key) { return [...new Set(data.map(d => d[key]))]; }

// Populate dropdown
function populateDropdown(id, values) {
    const select = document.getElementById(id);
    select.innerHTML = "";
    values.forEach(v => { const opt = document.createElement("option"); opt.value=v; opt.text=v; select.appendChild(opt); });
}

// Initialize controls
function initControls() {
    const districts = getUnique(casesData, "District").sort();
    const years = getUnique(casesData.concat(ewsData), "Year").sort();
    populateDropdown("districtSelect", districts);
    populateDropdown("yearSelect", ["All", ...years]);

    document.getElementById("districtSelect").value = districts[0];
    document.getElementById("districtSelect").addEventListener("change", ()=>{ plotTrend(); plotMap(); });
    document.getElementById("yearSelect").addEventListener("change", ()=>{ plotTrend(); plotMap(); });
}

// Plot trend chart
function plotTrend() {
    const district = document.getElementById("districtSelect").value;
    const year = document.getElementById("yearSelect").value;

    let filteredCases = casesData.filter(d=>d.District===district);
    if(year!=="All") filteredCases = filteredCases.filter(d=>d.Year==year);
    filteredCases.sort((a,b)=>a.Year-b.Year||a.Month1-b.Month1);

    let filteredEWS = ewsData.filter(d=>d.District===district);
    if(year!=="All") filteredEWS = filteredEWS.filter(d=>d.Year==year);
    filteredEWS.sort((a,b)=>a.Year-b.Year||a.Month-b.Month);

    const xCases = filteredCases.map(d=>`${d.Month}-${d.Year}`);
    const yCases = filteredCases.map(d=>d.Cases);

    const xEWS = filteredEWS.map(d=>`${d.Month}-${d.Year}`);
    const yProb = filteredEWS.map(d=>d.Prob_High_Dengue);
    const xAlert = xEWS.filter((_,i)=>filteredEWS[i].High_Alert===1);
    const yAlert = yProb.filter((_,i)=>filteredEWS[i].High_Alert===1);

    const traceCases = { x:xCases, y:yCases, mode:"lines+markers", type:"scatter", name:"Monthly cases", line:{color:"#FF4136"}, marker:{size:6} };
    const traceProb  = { x:xEWS, y:yProb, mode:"lines+markers", type:"scatter", name:"Predicted probability", line:{color:"#0074D9", dash:"dot"}, marker:{size:6} };
    const traceAlert = { x:xAlert, y:yAlert, mode:"markers", type:"scatter", name:"High Alert", marker:{color:"orange", size:10, symbol:"triangle-up"} };

    Plotly.newPlot("chart",[traceCases,traceProb,traceAlert],{title:`Dengue cases and future alerts in ${district}`, xaxis:{title:"Month-Year", tickangle:-45}, yaxis:{title:"Cases / Probability"}, margin:{t:50,b:100}},{responsive:true});
}

// Plot Bangladesh district map
function plotMap() {
    const year = document.getElementById("yearSelect").value;

    // Aggregate cases or probability by district
    let dataForMap = {};
    mapData.features.forEach(f=>{
        const dName = f.properties.ADM2_EN;
        let val = 0;
        if(year==="All"){
            // sum all years
            val = casesData.filter(d=>d.District===dName).reduce((a,b)=>a+b.Cases,0);
        } else {
            const cases = casesData.filter(d=>d.District===dName && d.Year==year);
            const ews   = ewsData.filter(d=>d.District===dName && d.Year==year);
            val = cases.length>0? cases.reduce((a,b)=>a+b.Cases,0) : (ews.length>0 ? Math.max(...ews.map(d=>d.Prob_High_Dengue)) : 0);
        }
        dataForMap[dName] = val;
    });

    const zValues = mapData.features.map(f=>dataForMap[f.properties.ADM2_EN] || 0);

    const trace = {
        type:"choroplethmapbox",
        geojson: mapData,
        locations: mapData.features.map(f=>f.properties.ADM2_EN),
        z: zValues,
        featureidkey:"properties.ADM2_EN",
        colorscale:"YlOrRd",
        colorbar:{title:"Cases / Prob"},
        marker:{line:{width:0.5, color:"black"}}
    };

    const layout = {
        mapbox:{style:"carto-positron", center:{lat:23.685, lon:90.3563}, zoom:6},
        margin:{t:0,b:0,l:0,r:0}
    };

    Plotly.newPlot("map",[trace],layout,{responsive:true});
}

// Start
loadData();
</script>

</body>
</html>
