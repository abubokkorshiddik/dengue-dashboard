<!DOCTYPE html>
<html>
<head>
    <title>Dengue dashboard Bangladesh</title>

    <!-- Plotly for charts and map -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            font-family: Arial;
            margin: 20px;
            background: #f5f5f5;
        }
        h2 {
            color: #333;
        }
        #controls {
            margin-bottom: 20px;
            padding: 10px;
            background: white;
            border-radius: 8px;
        }
        select {
            margin-right: 15px;
            padding: 5px;
        }
        #trend, #map {
            background: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        #map {
            height: 500px;
        }
    </style>
</head>
<body>

<h2>Dengue dashboard Bangladesh</h2>

<div id="controls">
    District:
    <select id="districtSelect"></select>

    Year:
    <select id="yearSelect">
        <option value="All">All</option>
    </select>
</div>

<!-- Trend Section -->
<h3>Monthly cases and early warnings</h3>
<div id="trend"></div>

<!-- Map Section -->
<h3>Bangladesh district map</h3>
<div id="map"></div>

<script>
let casesData = [];
let ewsData = [];
let geoData = [];

// Load all JSON files
async function loadData() {
    try {
        const [resCases, resEWS, resGeo] = await Promise.all([
            fetch("dengue_bd.json"),
            fetch("dengue_ews.json"),
            fetch("bangladesh_districts_small.json")
        ]);

        casesData = (await resCases.json()).map(d => ({
            District: d.District,
            Month: d.Month,
            Month1: Number(d.Month1),
            Year: Number(d.Year),
            Cases: Number(d.Monthly_cases)
        }));

        ewsData = (await resEWS.json()).map(d => ({
            District: d.District,
            Month: Number(d.Month),
            Year: Number(d.Year),
            Prob_High_Dengue: Number(d.Prob_High_Dengue),
            High_Alert: Number(d.High_Alert)
        }));

        geoData = await resGeo.json();

        initControls();
        updateTrendAndMap();
    } catch (err) {
        console.error(err);
        alert("Error loading JSON files. Check dengue_bd.json, dengue_ews.json, and bangladesh_districts_small.json.");
    }
}

// Unique values
function getUnique(data, key) {
    return [...new Set(data.map(d => d[key]))];
}

// Populate dropdown
function populateDropdown(id, values) {
    const select = document.getElementById(id);
    select.innerHTML = "";
    values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.text = v;
        select.appendChild(opt);
    });
}

// Initialize controls
function initControls() {
    const districts = getUnique(casesData, "District").sort();
    const years = getUnique(casesData.concat(ewsData), "Year").sort();

    populateDropdown("districtSelect", districts);
    populateDropdown("yearSelect", ["All", ...years]);

    document.getElementById("districtSelect").value = districts[0];

    document.getElementById("districtSelect").addEventListener("change", updateTrendAndMap);
    document.getElementById("yearSelect").addEventListener("change", updateTrendAndMap);
}

// Update both trend and map
function updateTrendAndMap() {
    const district = document.getElementById("districtSelect").value;
    const year = document.getElementById("yearSelect").value;

    // === Trend Section ===
    let filteredCases = casesData.filter(d => d.District === district);
    if (year !== "All") filteredCases = filteredCases.filter(d => d.Year == year);
    filteredCases.sort((a,b) => a.Year - b.Year || a.Month1 - b.Month1);

    let filteredEWS = ewsData.filter(d => d.District === district);
    if (year !== "All") filteredEWS = filteredEWS.filter(d => d.Year == year);
    filteredEWS.sort((a,b) => a.Year - b.Year || a.Month - b.Month);

    const xCases = filteredCases.map(d => `${d.Month}-${d.Year}`);
    const yCases = filteredCases.map(d => d.Cases);
    const xEWS = filteredEWS.map(d => `${d.Month}-${d.Year}`);
    const yProb = filteredEWS.map(d => d.Prob_High_Dengue);
    const xAlert = xEWS.filter((_, i) => filteredEWS[i].High_Alert === 1);
    const yAlert = yProb.filter((_, i) => filteredEWS[i].High_Alert === 1);

    const traceCases = { x: xCases, y: yCases, mode: "lines+markers", type: "scatter", name: "Monthly cases", line: { color: "#FF4136" }, marker: { size: 6 } };
    const traceProb = { x: xEWS, y: yProb, mode: "lines+markers", type: "scatter", name: "Predicted probability", line: { color: "#0074D9", dash: "dot" }, marker: { size: 6 } };
    const traceAlert = { x: xAlert, y: yAlert, mode: "markers", type: "scatter", name: "High Alert", marker: { color: "orange", size: 10, symbol: "triangle-up" } };

    Plotly.newPlot("trend", [traceCases, traceProb, traceAlert], {
        title: `Dengue cases & future alerts in ${district}`,
        xaxis: { title: "Month-Year", tickangle: -45 },
        yaxis: { title: "Cases / Probability" },
        margin: { t: 50, b: 100 }
    }, {responsive: true});

    // === Map Section ===
    const districtCases = {};
    geoData.features.forEach(f => { districtCases[f.properties.ADM2_EN] = 0; });

    casesData.forEach(d => {
        if ((year === "All") || (d.Year == year)) {
            if (districtCases.hasOwnProperty(d.District)) districtCases[d.District] += d.Cases;
        }
    });

    const mapData = [{
        type: "choroplethmapbox",
        geojson: geoData,
        locations: Object.keys(districtCases),
        z: Object.values(districtCases),
        featureidkey: "properties.ADM2_EN",
        colorscale: "YlOrRd",
        marker: { line: { width: 0.5, color: "white" } },
        colorbar: { title: "Total cases" }
    }];

    const mapLayout = {
        mapbox: { style: "carto-positron", center: { lon: 90.5, lat: 23.5 }, zoom: 6 },
        margin: { t:0, b:0 }
    };

    Plotly.newPlot("map", mapData, mapLayout, {responsive: true});
}

// Start
loadData();
</script>

</body>
</html>
